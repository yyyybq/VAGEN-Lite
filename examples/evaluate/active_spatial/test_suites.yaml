name: active_spatial_test_matrix_v1

# Defaults are applied to every suite and can be overridden per suite.
defaults:
  max_steps_per_episode: 20
  num_eval_episodes: null
  use_wandb: false
  save_trajectories: true
  task_types:
    - absolute_positioning
    - equidistance
    - projective_relations
    - centering
    - occlusion_alignment
    - fov_inclusion
    - size_distance_invariance
    - apparent_size_ordering
    - screen_occupancy
  env:
    render_backend: local
    gs_root: /scratch/by2593/project/Active_Spatial/InteriorGS
    gpu_device: 4
    image_width: 512
    image_height: 512
    success_score_threshold: 0.85
    exclude_task_types:
      - delta_control
  model:
    provider: vllm
    model_name: Qwen/Qwen2.5-VL-3B-Instruct
    temperature: 0.1
    top_p: 0.95
    max_tokens: 512
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.8

suites:
  # Keep these names stable; they become output directory names and summary keys.
  - name: id_test
    description: In-domain held-out test set. Replace jsonl_path with the canonical ID test split.
    jsonl_path: data_gen/active_spatial_pipeline/output_v2/test_id_v1.jsonl

  - name: ood_scene
    description: Held-out scenes / layouts.
    jsonl_path: data_gen/active_spatial_pipeline/ood_splits/ood_scene.jsonl

  - name: ood_object
    description: Held-out target objects or object categories.
    jsonl_path: data_gen/active_spatial_pipeline/ood_splits/ood_instance.jsonl

  - name: ood_category
    description: Target object categories absent from training.
    jsonl_path: data_gen/active_spatial_pipeline/ood_splits/ood_category.jsonl

  - name: ood_template
    description: Same task semantics with paraphrased instructions.
    jsonl_path: data_gen/active_spatial_pipeline/ood_splits/ood_template.jsonl

  - name: ood_geometry
    description: Unusual metric distances/scales outside the central training range.
    jsonl_path: data_gen/active_spatial_pipeline/ood_splits/ood_geometry.jsonl

  - name: ood_task_mix
    description: Shifted task-type mix; useful for detecting task farming.
    jsonl_path: data_gen/active_spatial_pipeline/output_v2/test_ood_task_mix_v1.jsonl

  - name: smoke
    description: Tiny smoke suite for checking eval infrastructure before long runs.
    jsonl_path: data_gen/active_spatial_pipeline/output_v2/test_id_v1.jsonl
    max_episodes: 3
    save_trajectories: false
