# Active Spatial Navigation — Validation data config (no-concat mode)
#
# Same structure as the training config but with a held-out seed range.

envs:
  - name: RemoteEnv
    n_envs: 500            # validation set size
    data_source: active_spatial
    seed: [10000, 10500]   # held-out seed range
    max_turns: 10
    response_length_per_turn: 512
    config:
      base_urls: "http://localhost:8001"
      timeout: 120
      retries: 3

      jsonl_path: "/path/to/active_spatial/val.jsonl"
      dataset_root: "/path/to/active_spatial/"

      render_backend: "client"
      client_url: "ws://localhost:8777/render/interiorgs"

      step_translation: 0.3
      step_rotation_deg: 30.0

      enable_potential_field: true
      success_score_threshold: 0.95
      enable_auto_termination: true
      format_reward: 0.2
      success_reward: 1.0

      enable_collision_detection: true
      collision_penalty: -0.15
      enable_step_penalty: true
      step_penalty: -0.01

      max_episode_steps: 50
      max_actions_per_step: 5
      action_sep: "|"

      prompt_format: "free_think"
