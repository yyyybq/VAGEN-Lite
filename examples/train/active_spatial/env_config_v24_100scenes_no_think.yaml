# =============================================================================
# v24_100scenes — 94 个训练场景（100 场景去除 6 个 OOD val 场景后）
# =============================================================================
# 数据来源:
#   data_gen/active_spatial_pipeline/output_100scenes/train_100scenes_no_ood.jsonl
#   生成方式: 从 output_100scenes/train.jsonl (30979 tasks, 100 scenes) 中
#             剔除 6 个 OOD val 场景 (val_ood_v1.jsonl 涉及的 scene_id),
#             得到 28662 tasks, 94 个独立场景.
#
# OOD val 被排除的 6 个场景:
#   0276_840780 / 0367_840260 / 0229_840306 / 0266_840789 / 0351_840366 / 0240_840881
#
# 与 env_config_v22_3scenes.yaml 的差异:
#   ★ jsonl_path: train_data_3scenes_v1.jsonl -> train_100scenes_no_ood.jsonl -> train_100scenes_7types.jsonl
#   ★ train_size: 752 -> 28662 -> 15985  (去除 screen_occupancy / size_distance_invariance 后)
#   ★ test_size:  19  -> 19  (沿用 val_ood_v1.jsonl 第一部分的 19 个 in-domain val)
# =============================================================================

env1:
    env_name: active_spatial
    env_config:
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN-Lite/data_gen/active_spatial_pipeline/output_100scenes/train_100scenes_7types.jsonl"

        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4
        image_width: 256
        image_height: 256

        step_translation: 0.3
        step_rotation_deg: 20.0

        max_actions_per_step: 5

        action_space: "strafe"
        enable_explicit_done: false

        # ─── γ-potential shaping ──────────────────────────────────────────────
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 0.5
        potential_field_progress_mode: "potential"
        potential_field_gamma: 0.99

        success_score_threshold: 0.65
        enable_auto_termination: true

        near_success_threshold: 0.55
        near_success_bonus: 0.2
        near_success_mode: "constant"

        # ─── AND-gate (thr=0.70) ──────────────────────────────────────────────
        success_require_both: true
        success_position_threshold: 0.70
        success_orientation_threshold: 0.70

        enable_collision_detection: false
        enable_visibility_check: false

        # ─── no_farm reward ───────────────────────────────────────────────────
        format_reward: 0.0
        invalid_format_penalty: -0.2
        max_consecutive_invalid_actions: 3
        premature_done_penalty: -0.3
        step_penalty: -0.02
        enable_step_penalty: true
        success_reward: 50.0
        max_distance: 5.0

        prompt_format: no_think
        action_sep: "|"
        image_placeholder: "<image>"

        max_episode_steps: 60

    train_size: 11190
    test_size: 21
