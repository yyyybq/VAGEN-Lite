# =============================================================================
# Active Spatial - 远程渲染模式配置模板（训练机与渲染机分离）
# =============================================================================
# 使用方法：
#   在实验配置文件（experiments/vXX_xxx.sh）中设置：
#
#     RENDER_MODE=remote
#     RENDER_HOST=<渲染机 IP 或主机名>   # 例如 10.0.0.5 或 render-node-01
#     RENDER_PORT=8777                    # 默认即 8777，可省略
#     ENV_CONFIG=env_config_remote_render.yaml
#
#   run_experiment.sh 会在运行时自动将 RENDER_HOST/RENDER_PORT 注入 client_url。
#
# 渲染机上需要先启动服务（见 start_render_server.sh）：
#   bash scripts/examples/vagen_base/active_spatial/start_render_server.sh \
#       --gs-root /path/to/InteriorGS \
#       --port 8777
#
# 注意：
#   - gs_root / gpu_device 在 client 模式下无需设置（渲染在远端完成）
#   - train_size / test_size 和本地模式保持一致
# =============================================================================

env1:
    env_name: active_spatial
    env_config:
        # Dataset configuration
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"

        # Rendering: 远程渲染服务器（WebSocket）
        # client_url 由 run_experiment.sh 在运行时根据 RENDER_HOST/RENDER_PORT 注入
        render_backend: client
        client_url: "ws://RENDER_HOST_PLACEHOLDER:8777/render/interiorgs"
        image_width: 256
        image_height: 256

        # Camera control configuration
        step_translation: 0.2    # meters per step
        step_rotation_deg: 10.0  # degrees per step

        # Per-1-Action
        max_actions_per_step: 1

        # Spatial Potential Field (dense reward)
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 1.0
        success_score_threshold: 0.85

        # Collision Detection
        enable_collision_detection: true
        collision_camera_radius: 0.15
        collision_floor_height: 0.3
        collision_ceiling_height: 2.5
        collision_penalty: -0.05

        # Visibility Check
        enable_visibility_check: true
        fov_horizontal: 60.0
        fov_vertical: 60.0

        # Reward configuration
        format_reward: 0.01
        success_reward: 1.0
        max_distance: 5.0

        # Prompt configuration
        prompt_format: free_think
        action_sep: "|"
        image_placeholder: "<image>"

        # Episode configuration
        max_episode_steps: 50

    train_size: 259
    test_size: 19
