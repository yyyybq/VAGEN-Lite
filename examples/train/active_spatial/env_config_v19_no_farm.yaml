# =============================================================================
# v19_no_farm — Winner base (v19_thr70_andgate) × kill format-farming
# =============================================================================
# Hypothesis:
#   多个版本观察到 response_length 持续上升 (180+ tokens), env_turns 也偏长.
#   猜测: format_reward=0.05 × 每动作累计 + step_penalty 仅 -0.005, 让 agent
#   学会“多输出格式化 token + 多动作磨时间” 来刷小额正向奖励, 反而稀释
#   shape reward 的信号.
#   收紧两个旋钮:
#     ★ format_reward 0.05 -> 0.0   (彻底关闭 format farming 通道)
#     ★ step_penalty  -0.005 -> -0.02  (4x 步罚, 鼓励早 done)
#
#   配合 winner base 的 thr=0.70 AND-gate, 期望:
#     - response_length 显著下降 (回到 80-120)
#     - env_turns 缩短 (~5 -> ~4)
#     - val_traj_succ 不会塌, 因为只剩 shape + success 信号
#
# 相对 v19_thr70_andgate 的改动:
#   ★ format_reward: 0.05 -> 0.0
#   ★ step_penalty:  -0.005 -> -0.02
# =============================================================================

env1:
    env_name: active_spatial
    env_config:
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"

        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4
        image_width: 256
        image_height: 256

        step_translation: 0.3
        step_rotation_deg: 20.0

        max_actions_per_step: 5

        action_space: "strafe"
        enable_explicit_done: false

        # ─── γ-potential shaping ──────────────────────────────────────────────
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 0.5
        potential_field_progress_mode: "potential"
        potential_field_gamma: 0.99

        success_score_threshold: 0.65
        enable_auto_termination: true

        near_success_threshold: 0.55
        near_success_bonus: 0.2
        near_success_mode: "constant"

        # ─── AND-gate (thr=0.70) ──────────────────────────────────────────────
        success_require_both: true
        success_position_threshold: 0.70
        success_orientation_threshold: 0.70

        enable_collision_detection: false
        enable_visibility_check: false

        format_reward: 0.0                    # ★ 0.05 -> 0.0
        invalid_format_penalty: -0.2
        max_consecutive_invalid_actions: 3
        premature_done_penalty: -0.3
        step_penalty: -0.02                   # ★ -0.005 -> -0.02
        enable_step_penalty: true
        success_reward: 50.0
        max_distance: 5.0

        prompt_format: free_think
        action_sep: "|"
        image_placeholder: "<image>"

        max_episode_steps: 60

    train_size: 259
    test_size: 19
