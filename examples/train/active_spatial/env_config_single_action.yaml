# =============================================================================
# Active Spatial - Per-1-Action Config (v10)
# =============================================================================
# 核心改动：max_actions_per_step=1（per-action dense reward）
#
# 与 env_config_balanced.yaml 的主要区别：
#   max_actions_per_step: 1   (was 5)  → 每个 LLM turn 只输出 1 个 action
#   format_reward:        0.01 (was 0.05) → 远小于单步 Δscore，防 done-spam
#   collision_penalty:   -0.05 (was -0.15) → 按比例缩小，与 per-action Δscore 相称

env1:
    env_name: active_spatial
    env_config:
        # Dataset configuration
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"

        # Rendering: local GPU with gsplat (real-time rendering)
        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4
        image_width: 512
        image_height: 512

        # Camera control configuration
        step_translation: 0.2    # meters per step
        step_rotation_deg: 10.0  # degrees per step

        # ─── Per-1-Action Core Change ────────────────────────────────────────
        max_actions_per_step: 1   # Each LLM turn = exactly 1 action
        # ─────────────────────────────────────────────────────────────────────

        # Spatial Potential Field (dense reward)
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 1.0
        success_score_threshold: 0.85

        # Collision Detection
        enable_collision_detection: true
        collision_camera_radius: 0.15
        collision_floor_height: 0.3
        collision_ceiling_height: 2.5
        collision_penalty: -0.05    # Scaled down: was -0.15 when max_actions=5
                                    # Per-action Δscore ≈ 0.03–0.08; penalty should be < 2×

        # Visibility Check
        enable_visibility_check: true
        fov_horizontal: 60.0
        fov_vertical: 60.0

        # Reward configuration
        format_reward: 0.01   # Scaled down: was 0.05 when max_actions=5
                              # Must be << per-action Δscore to prevent done-spam
                              # Typical per-action Δscore ≈ 0.03–0.08, so 0.01 ≈ 1/5 of that
        premature_done_penalty: -0.3  # Penalty when 'done' is called without reaching target
                                      # Discourages giving up on gray/dark images
        success_reward: 1.0
        max_distance: 5.0

        # Prompt configuration
        prompt_format: free_think
        action_sep: "|"
        image_placeholder: "<image>"

        # Episode configuration
        max_episode_steps: 50   # Per-action: 1 LLM turn = 1 env step.
                                # With max_turns=20 (set in rollout_manager), this
                                # never binds (20 < 50).

    train_size: 259
    test_size: 19
