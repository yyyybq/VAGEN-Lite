# =============================================================================
# v18_andgate — v18_potential2 + AND-gate (success_require_both)
# =============================================================================
# 在测什么:
#   v18_potential2 把 success_score_threshold 从 0.30 拉到 0.40, 缓解了 pos
#   单通道速胜问题, 但 total_score = 0.7·pos + 0.3·ori 这个加权仍允许
#   "pos=0.57, ori=0" 一类极不平衡的姿态被判成功 (0.57·0.7 = 0.40 即达标).
#
#   v18_andgate 切换到 env.py 新增的 AND-gate 路径:
#       success := (pos_score >= pos_thr) AND (ori_score >= ori_thr)
#   把 success_require_both 翻成 true, 双轴必须同时达标才能 auto-terminate.
#   shaping (γ-potential) 保持 v18_potential2 不变 — 唯一变量就是终止判据.
#
# 假设:
#   - env_turns/mean 会显著升高 (无法靠 pos 单通道速胜)
#   - orientation_score 提升, turn_left/turn_right 使用率上升
#   - 早期 reward 可能下降, 但 traj_success 应更接近"真"成功
#
# 相对 v18_potential2 的唯一改动:
#   ★ success_require_both: false -> true
#   ★ success_position_threshold: 0.5 -> 0.45
#   ★ success_orientation_threshold: 0.5 -> 0.45
#   (success_score_threshold 此时被 env.py 忽略, 不再起作用)
# =============================================================================

env1:
    env_name: active_spatial
    env_config:
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"

        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4
        image_width: 256
        image_height: 256

        # ★ E4
        step_translation: 0.3
        step_rotation_deg: 20.0

        max_actions_per_step: 5

        action_space: "strafe"
        enable_explicit_done: false

        # ─── γ-potential shaping (沿用 v18_potential2) ──────────────────────
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 0.5
        potential_field_progress_mode: "potential"
        potential_field_gamma: 0.99

        # success_score_threshold 在 AND-gate 模式下不起作用, 但保留以防回滚.
        success_score_threshold: 0.40
        enable_auto_termination: true

        # Near-success bonus (沿用 v18_potential2 constant)
        near_success_threshold: 0.35
        near_success_bonus: 0.2
        near_success_mode: "constant"

        # ─── ★ v18_andgate: AND-gate ON ─────────────────────────────────────
        success_require_both: true              # ★ false -> true
        success_position_threshold: 0.45        # ★ 0.5 -> 0.45
        success_orientation_threshold: 0.45     # ★ 0.5 -> 0.45

        enable_collision_detection: false
        enable_visibility_check: false

        format_reward: 0.05
        invalid_format_penalty: -0.2
        max_consecutive_invalid_actions: 3
        premature_done_penalty: -0.3
        step_penalty: -0.005
        enable_step_penalty: true
        success_reward: 50.0
        max_distance: 5.0

        prompt_format: free_think
        action_sep: "|"
        image_placeholder: "<image>"

        max_episode_steps: 60

    train_size: 259
    test_size: 19
