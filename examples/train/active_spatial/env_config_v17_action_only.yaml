# v17 ablation A: action-space fix ONLY (keep v16 reward scale).
# Goal: isolate the contribution of "add move_left/right + drop look_up/down +
# disable explicit done" against the reward-shape redesign. If v17_action_only
# already trains and v17_reward_only does not, the action space was the
# dominant bottleneck.
env1:
    env_name: active_spatial
    env_config:
        jsonl_path: "/scratch/by2593/project/Active_Spatial/VAGEN/data_gen/active_spatial_pipeline/output_v2/train_data_0267_840790.jsonl"
        render_backend: local
        gs_root: "/scratch/by2593/project/Active_Spatial/InteriorGS"
        gpu_device: 4
        image_width: 256
        image_height: 256

        step_translation: 0.2
        step_rotation_deg: 15.0

        max_actions_per_step: 5

        # ★ action-space fix (same as v17 full)
        action_space: "strafe"
        enable_explicit_done: false

        # === v16 reward shape (UNCHANGED) ===
        enable_potential_field: true
        potential_field_position_weight: 0.7
        potential_field_orientation_weight: 0.3
        potential_field_reward_scale: 5.0      # v16
        potential_field_progress_mode: "delta"
        success_score_threshold: 0.50          # v16
        enable_auto_termination: true

        # no near-success bonus in this ablation
        near_success_threshold: 0.0
        near_success_bonus: 0.0

        # keep v16's collision + visibility
        enable_collision_detection: true
        collision_camera_radius: 0.15
        collision_floor_height: 0.3
        collision_ceiling_height: 2.5
        collision_penalty: -0.15
        enable_visibility_check: true
        visibility_reward_scale: 0.05
        fov_horizontal: 60.0
        fov_vertical: 60.0

        format_reward: 0.05
        invalid_format_penalty: -0.2     # ★ still doubled (otherwise apples-to-oranges with full v17)
        max_consecutive_invalid_actions: 3
        premature_done_penalty: -0.3
        step_penalty: -0.01              # v16
        enable_step_penalty: true
        success_reward: 5.0              # v16
        max_distance: 5.0

        prompt_format: free_think
        action_sep: "|"
        image_placeholder: "<image>"

        max_episode_steps: 60

    train_size: 259
    test_size: 19
