    desc: "v38 masked_gae 6types fastcosine, step 200 (ID_m4=0.488)"
    training_id_m4: 0.488

  v38_step300:
    path: "exps/vagen_active_spatial/v38_masked_gae_6types_fastcosine/checkpoints/global_step_300/actor/huggingface"
    desc: "v38 masked_gae 6types fastcosine, step 300 (ID_m4=0.488, OOD recovery)"
    training_id_m4: 0.488

  v38_step350:
    path: "exps/vagen_active_spatial/v38_masked_gae_6types_fastcosine/checkpoints/global_step_350/actor/huggingface"
    desc: "v38 masked_gae 6types fastcosine, step 350 (latest, ID_m4=0.488, OOD_m4=0.368)"
    training_id_m4: 0.488

  # ── Cambrian-S ablations ───────────────────────────────────────────────────
  c4_step80:
    path: "exps/vagen_active_spatial/c4_fwdfirst/checkpoints/global_step_80/actor/huggingface"
    desc: "Cambrian-S c4 fwdfirst, step 80"
    model_type: "cambrians"

  c7_step80:
