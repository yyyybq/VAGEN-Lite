    desc: "Cambrian-S c8 fwdfirst rew-scale, step 200"
    model_type: "cambrians"

  # c10: freeze SigLIP vision tower — HF checkpoints saved every 25 steps
  # Completed training to step 200. Only step_125 and step_200 have HF format.
  c10_step125:
    path: "exps/vagen_active_spatial/c10_freeze_visiontower/checkpoints/global_step_125/actor/huggingface"
    desc: "Cambrian-S c10 freeze-visiontower GRPO KL=0.30, step 125"
    model_type: "cambrians"

  c10_step200:
    path: "exps/vagen_active_spatial/c10_freeze_visiontower/checkpoints/global_step_200/actor/huggingface"
    desc: "Cambrian-S c10 freeze-visiontower GRPO KL=0.30, step 200 (final)"
    model_type: "cambrians"


# ─────────────────────────── Benchmark Groups ────────────────────────────────
# Group names used with --benchmarks flag (e.g., --benchmarks default).
# Task names must match lmms-eval task names in lmms-eval-revsi.
#
# Key benchmarks:
#   mindcube_tiny      — MindCube Bench tiny (~300 items, image, rotation/around/among)
#   sparbench_tiny     — SPAR-Bench tiny (spatial physical reasoning)
#   mmsi_bench         — MMSI-Bench w/o circular (image spatial)
#   viewspatial        — ViewSpatial Bench (perspective-taking)
#   embspatial         — EmbSpatial-Bench (embodied spatial)
# ─────────────────────────────────────────────────────────────────────────────
benchmark_groups:
  # Quick daily monitoring (2-3 min per checkpoint on 1 GPU)
  default:
    - mindcube_tiny

  # Core EASI-8 image benchmarks (good for ablation comparisons)
  core:
    - mindcube_tiny
    - sparbench_tiny
    - mmsi_bench

  # 5 diverse spatial benchmarks — standard comprehensive evaluation
  # MindCube (rotation/around/among), SPAR-Bench (physical), MMSI (spatial QA),
  # ViewSpatial (perspective-taking), EmbSpatial (embodied grounding)
  core5:
    - mindcube_tiny
    - sparbench_tiny
    - mmsi_bench
    - viewspatial
    - embspatial

  # Extended spatial coverage (7 benches)
  extended:
    - mindcube_tiny
    - sparbench_tiny
    - mmsi_bench
    - viewspatial
    - embspatial
    - blink
    - cv_bench

  # Full EASI image suite
  full_image:
    - mindcube_tiny
    - sparbench_tiny
    - mmsi_bench
    - viewspatial
    - embspatial
    - blink
    - cv_bench
    - spatial457
    - refspatial

