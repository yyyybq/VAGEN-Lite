# ─────────────────────────────────────────────────────────────────────────────
# probe_registry.yaml — Checkpoint & Benchmark Registry for easi_probe.py
#
# Used by: scripts/easi_probe.py
# Backend: lmms-eval-revsi (contains all EASI spatial benchmarks)
# ─────────────────────────────────────────────────────────────────────────────

# Absolute path to the lmms-eval backend (already installed in vagen-lite env)
lmms_eval_dir: "/scratch/by2593/project/Active_Spatial/lmms-eval-revsi"

# Base directory for resolving relative checkpoint paths
base_ckpt_dir: "/scratch/by2593/project/Active_Spatial/VAGEN-Lite"

# ─────────────────────────── Checkpoints ─────────────────────────────────────
# Keys are short names used with --ckpts flag.
# path: absolute or relative-to-base_ckpt_dir HuggingFace directory.
# desc: free-text description shown in the comparison table.
# ─────────────────────────────────────────────────────────────────────────────
checkpoints:
  # ── Baseline ──────────────────────────────────────────────────────────────
  base:
    path: "Qwen/Qwen2.5-VL-3B-Instruct"
    desc: "Base Qwen2.5-VL-3B (pre-training)"

  # ── Historical peaks (reference) ──────────────────────────────────────────
  v26_step160:
    path: "exps/vagen_active_spatial/v26_klhi_lr5e7/checkpoints/global_step_160/actor/huggingface"
    desc: "v26 PPO KL-hi LR=5e-7, step 160 — historical ID_m4 ceiling (0.607)"
    training_id_m4: 0.607

  v26_step240:
    path: "exps/vagen_active_spatial/v26_klhi_lr5e7/checkpoints/global_step_240/actor/huggingface"
    desc: "v26 PPO KL-hi LR=5e-7, step 240 — post-peak (decay from ID_m4=0.607)"

  v28_step150:
    path: "exps/vagen_active_spatial/v28_klhi_lr5e7_cosine/checkpoints/global_step_150/actor/huggingface"
    desc: "v28 PPO KL-hi cosine decay, step 150"

  v28_step400:
    path: "exps/vagen_active_spatial/v28_klhi_lr5e7_cosine/checkpoints/global_step_400/actor/huggingface"
