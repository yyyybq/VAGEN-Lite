    desc: "v30 GRPO rew-scale, step 300"

  # ── v31 (unnamed_0612_1457 — naming bug) ──────────────────────────────────
  v31_step150:
    path: "exps/vagen_active_spatial/unnamed_0612_1457/checkpoints/global_step_150/actor/huggingface"
    desc: "v31 GRPO resume from v30, step 150 (dual-valley, ID_m4≈0.571)"
    training_id_m4: 0.571

  v31_step300:
    path: "exps/vagen_active_spatial/unnamed_0612_1457/checkpoints/global_step_300/actor/huggingface"
