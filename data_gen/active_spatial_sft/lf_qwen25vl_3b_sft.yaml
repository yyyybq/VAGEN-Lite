# LLaMA-Factory SFT config — Qwen2.5-VL-3B-Instruct on active_spatial 5k
#
# Usage:
#   llamafactory-cli train data_gen/active_spatial_sft/lf_qwen25vl_3b_sft.yaml
#
# Notes:
#   * `dataset_dir` must point at a directory containing `dataset_info.json`
#     (we copy lf_dataset_info.json into ${OUTPUT_DIR}/lf_data/dataset_info.json
#     in run_sft_qwen25vl_3b.sh) and the active_spatial_sft.parquet file.
#   * Full FT (no LoRA) — produces a HF checkpoint usable as verl RL warmstart.
#   * `freeze_vision_tower=true`  → keep ViT frozen, only train LLM + projector.
#     This matches Qwen-VL-style SFT-then-RL recipes.

### model
model_name_or_path: /scratch/by2593/.cache/huggingface/hub/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: false
deepspeed: null   # use FSDP via accelerate config instead

### dataset
dataset: active_spatial_sft           # name in dataset_info.json
template: qwen2_vl                    # LLaMA-Factory's Qwen2-VL template (also used for 2.5-VL)
cutoff_len: 8192
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### output
output_dir: /scratch/by2593/project/Active_Spatial/VAGEN-Lite/checkpoints/sft_qwen25vl_3b_5k
logging_steps: 5
save_steps: 200
save_strategy: steps
save_total_limit: 4
plot_loss: true
overwrite_output_dir: true
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true
ddp_timeout: 180000000
gradient_checkpointing: true
flash_attn: fa2

### eval
val_size: 0.02
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
